<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <p class="helper-text">Enter your email to continue.</p>

    <form method="POST" action="/login">
        <input
            type="email"
            name="email"
            placeholder="Email"
            autofocus
            required
        >

        <button type="submit">Next</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <a href="/register">Create an account</a>
</div>

</body>
</html>
